<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #060508;
      color: #f4f2f7;
      margin: 0;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .logo-badge {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background-color: #e60023;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
    }
    .title {
      font-size: 16px;
      font-weight: 850;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, #e60023 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .status-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(230, 0, 35, 0.15);
      border-radius: 10px;
      padding: 12px;
      box-sizing: border-box;
      text-align: center;
      font-size: 12px;
      color: #a19ea6;
      line-height: 1.5;
    }
    .status-card strong {
      color: #fff;
    }
    .btn {
      width: 100%;
      background-color: #e60023;
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background-color 0.2s ease;
    }
    .btn:hover {
      background-color: #b8001c;
    }
    .btn:disabled {
      background-color: #332225;
      color: #665557;
      cursor: not-allowed;
    }
    .footer {
      font-size: 10px;
      color: #666;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-badge">P</div>
      <span class="title">PinSaver Downloader</span>
    </div>
    
    <div id="status" class="status-card">
      Checking current page...
    </div>

    <button id="sendBtn" class="btn" disabled>
      Send to PinSaver
    </button>
    
    <div class="footer">
      Make sure PinSaver web app is running locally.
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
